<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gràfic de característiques individuals i d'estat: Messi vs. Cristiano Ronaldo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800;900&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --messi: #0E97B7;
      --messi-soft: #E1F3F7;
      --cristiano: #CE2B37;
      --cristiano-soft: #FBE6E8;
      --neutral: #8B95A1;
      --neutral-soft: #EEF1F4;
      --dark: #252552;
      --surface: #FFFFFF;
      --ink: #1A1C1F;
      --ink-soft: #50575E;
      --line: #E4E2DC;
      --font-head: 'Archivo', system-ui, sans-serif;
      --font-body: 'Source Serif 4', Georgia, serif;
      --radius: 14px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: transparent;
      color: var(--ink);
      font-family: var(--font-body);
      font-size: 1.18rem;
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
    }
    img { max-width: 100%; display: block; }

    .bc__note {
      font-family: var(--font-head);
      font-size: 0.82rem;
      color: var(--ink-soft);
      line-height: 1.4;
      margin: 1rem 0 0;
    }

    /* Llegenda */
    .bc__legend {
      display: flex;
      justify-content: space-between;
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 1rem;
      margin-bottom: 0.75rem;
      gap: 0.5rem;
    }
    .bc__legend-item:first-child { color: var(--messi); }
    .bc__legend-item:last-child  { color: var(--cristiano); text-align: right; }
    .bc__legend-arrow { font-size: 1em; vertical-align: middle; }

    /* Gràfic */
    .bc__chart { position: relative; }
    .bc__photos {
      position: absolute;
      top: 0; bottom: 0;
      left: 190px;
      right: 68px;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .bc__photo {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      height: 55%;
      width: auto;
      opacity: 0.55;
    }
    .bc__photo--messi { left: 0; }
    .bc__photo--cr7   { right: 0; }

    .bc__row {
      position: relative;
      z-index: 1;
      display: grid;
      align-items: center;
      gap: 0.5rem;
      height: 30px;
      border-radius: 6px;
      cursor: default;
    }
    .bc__row:hover, .bc__row:focus-visible { background: var(--neutral-soft); outline: none; }
    .bc__label { display: flex; align-items: center; gap: 7px; min-width: 0; }
    .bc__name {
      font-family: var(--font-head);
      font-size: 0.84rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .bc__lgnd-short { display: none; }
    .bc__track { position: relative; height: 100%; }
    .bc__zero {
      position: absolute; top: 2px; bottom: 2px;
      width: 1px;
      background: var(--ink);
      opacity: 0.5;
      transform: translateX(-0.5px);
    }
    .bc__bar {
      position: absolute;
      top: 50%;
      height: 13px;
      transform: translateY(-50%);
      border-radius: 3px;
    }
    .bc__bar--messi { background: var(--messi); }
    .bc__bar--cr7   { background: var(--cristiano); }
    .bc__bar--cap   { background: var(--neutral); }
    .bc__err {
      position: absolute;
      top: 50%;
      height: 7px;
      transform: translateY(-50%);
      border-left: 1.5px solid rgba(0,0,0,0.55);
      border-right: 1.5px solid rgba(0,0,0,0.55);
    }
    .bc__err::before {
      content: '';
      position: absolute; top: 50%; left: 0; right: 0;
      height: 1.5px;
      background: rgba(0,0,0,0.55);
      transform: translateY(-50%);
    }
    .bc__val {
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 0.8rem;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    .bc__val--messi { color: var(--messi); }
    .bc__val--cr7   { color: var(--cristiano); }
    .bc__val--cap   { color: var(--ink-soft); }

    /* Característiques */
    .bc__chart--caract .bc__row,
    .bc__chart--caract3 .bc__row {
      grid-template-columns: 180px 1fr 58px;
      height: 30px;
    }
    .bc__chart--caract .bc__track,
    .bc__chart--caract3 .bc__track { height: 28px; }
    .bc__chart--caract .bc__name,
    .bc__chart--caract3 .bc__name {
      font-size: 0.84rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .caract__panel-title {
      font-family: var(--font-head);
      font-weight: 800;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--ink-soft);
      border-bottom: 1px solid var(--line);
      padding-bottom: 0.4rem;
      margin: 0 0 0.5rem;
    }
    .bc__chart + .caract__panel-title,
    .bc__chart--caract + .caract__panel-title,
    .bc__chart--caract3 + .caract__panel-title {
      margin-top: 1.5rem;
    }

    @media (max-width: 640px) {
      .bc__photos { display: none; }
      .bc__lgnd-full  { display: none; }
      .bc__lgnd-short { display: inline; }
      .bc__chart--caract .bc__row,
      .bc__chart--caract3 .bc__row {
        grid-template-columns: 108px 1fr 46px;
        height: auto;
        min-height: 30px;
        padding: 3px 0;
      }
      .bc__chart--caract .bc__name,
      .bc__chart--caract3 .bc__name {
        font-size: 0.75rem;
        white-space: normal;
        line-height: 1.2;
      }
      .bc__chart--caract .bc__track,
      .bc__chart--caract3 .bc__track { height: 24px; }
    }
  </style>
</head>
<body>
  <div id="chart-caracteristiques"></div>

  <script>
  (function () {
    'use strict';

    var BASE = 'https://messi-cristiano-ronaldo-politica.periodismededades.cat/assets/';

    var bloc1 = [
      { label: 'Ideologia progressista',   b: -0.070, se: 0.013, lean: 'messi' },
      { label: 'Interès en política',      b: -0.017, se: 0.014, lean: 'cap'   },
      { label: 'Alt nivell educatiu',      b: -0.013, se: 0.012, lean: 'cap'   },
      { label: 'Persona reflexiva',        b: -0.011, se: 0.006, lean: 'messi' },
      { label: 'Classe social alta',       b: -0.002, se: 0.018, lean: 'cap'   },
      { label: 'Edat més gran',            b: -0.001, se: 0.001, lean: 'cap'   },
      { label: 'Persona empàtica',         b:  0.001, se: 0.016, lean: 'cap'   },
      { label: 'Consum de TV i ràdio',     b:  0.002, se: 0.016, lean: 'cap'   },
      { label: 'Gènere (dona)',            b:  0.024, se: 0.026, lean: 'cap'   },
      { label: 'Orientació autoritària',   b:  0.051, se: 0.011, lean: 'cr7'   },
      { label: 'Autoestima alta',          b:  0.053, se: 0.014, lean: 'cr7'   },
      { label: 'Consum de vídeos curts',   b:  0.062, se: 0.017, lean: 'cr7'   }
    ];

    var bloc3 = [
      { label: 'Qualitat democràtica', b: -0.688, se: 0.380, lean: 'cap' },
      { label: 'Rànquing FIFA',        b:  0.001, se: 0.002, lean: 'cap' }
    ];

    function makeRows(data, dmin, dmax) {
      function pct(v) { return (v - dmin) / (dmax - dmin) * 100; }
      var zp  = pct(0);
      var out = '';
      data.forEach(function (item) {
        var bp   = pct(item.b);
        var barL = Math.min(zp, bp);
        var barW = Math.abs(bp - zp);
        var errL = Math.max(0, Math.min(100, pct(item.b - 1.96 * item.se)));
        var errW = Math.max(0, Math.min(100, pct(item.b + 1.96 * item.se))) - errL;
        var sign = item.b < 0 ? '−' : (item.b > 0 ? '+' : '');
        var val  = sign + Math.abs(item.b).toFixed(3).replace('.', ',');
        out += '<div class="bc__row" tabindex="0">' +
          '<div class="bc__label"><span class="bc__name">' + item.label + '</span></div>' +
          '<div class="bc__track">' +
            '<span class="bc__zero" style="left:' + zp.toFixed(2) + '%"></span>' +
            '<span class="bc__bar bc__bar--' + item.lean + '" style="left:' + barL.toFixed(2) + '%;width:' + barW.toFixed(2) + '%"></span>' +
            '<span class="bc__err" style="left:' + errL.toFixed(2) + '%;width:' + errW.toFixed(2) + '%"></span>' +
          '</div>' +
          '<div class="bc__val bc__val--' + item.lean + '">' + val + '</div>' +
        '</div>';
      });
      return out;
    }

    function caractChart() {
      var root = document.getElementById('chart-caracteristiques');
      if (!root) return;

      var html = '';
      html += '<div class="bc__legend">' +
        '<span class="bc__legend-item"><span class="bc__legend-arrow">◀</span> Preferència per Messi</span>' +
        '<span class="bc__legend-item">Preferència per <span class="bc__lgnd-full">Cristiano Ronaldo</span><span class="bc__lgnd-short" aria-hidden="true">Ronaldo</span> <span class="bc__legend-arrow">▶</span></span>' +
        '</div>';

      html += '<p class="caract__panel-title">Característiques individuals</p>';
      html += '<div class="bc__chart bc__chart--caract">';
      html += '<div class="bc__photos" aria-hidden="true">' +
        '<img class="bc__photo bc__photo--messi" src="' + BASE + 'fotos/Messi_complet_cut.png" alt="">' +
        '<img class="bc__photo bc__photo--cr7" src="' + BASE + 'fotos/Ronaldo_complet_cut.png" alt="">' +
        '</div>';
      html += makeRows(bloc1, -0.12, 0.12);
      html += '</div>';

      html += '<p class="caract__panel-title">Variables d\'estat</p>';
      html += '<div class="bc__chart bc__chart--caract3">';
      html += makeRows(bloc3, -1.0, 1.0);
      html += '</div>';


      root.innerHTML = html;
    }

    caractChart();
  })();
  </script>
  <script>
    function sendHeight() {
      window.parent.postMessage({ height: document.documentElement.scrollHeight }, '*');
    }
    window.addEventListener('load', sendHeight);
    window.addEventListener('resize', sendHeight);
    new MutationObserver(sendHeight).observe(document.body, { subtree: true, childList: true });
  </script>
</body>
</html>
